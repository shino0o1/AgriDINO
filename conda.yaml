name: agridino
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.7.1
  - torchvision>=0.17.1
  - pytorch-cuda=11.8
  - cudatoolkit=11.8
  - pip
  - pip:
    - ftfy
    - omegaconf
    - regex
    - scikit-learn
    - submitit
    - termcolor
    - torchmetrics
    - transformers>=4.56.0
    - timm>=1.0.20
    - huggingface_hub
    - pillow
    - matplotlib
    - numpy
    - pandas
    - tqdm
    - pycocotools
    - opencv-python
    - scipy
